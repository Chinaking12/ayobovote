<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/all.css" />

    <title>Admin Dashboard</title>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark shadow-sm bg-danger">
      <div class="container">
        <span class="navbar-brand mb-0 h1">Admin Dashboard</span>
        <a href="login.html" class="btn btn-outline-light">Logout</a>
      </div>
    </nav>

    <div class="container py-5">
      <h2 class="fw-bold mb-4">Dashboard Overview</h2>

      <!-- Stats -->
      <div class="row g-4 mb-5">
        <div class="col-md-4">
          <div class="card shadow-sm border-0 h-100">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-primary-soft me-3">
                <i class="bi bi-people-fill text-primary fs-3"></i>
              </div>
              <div>
                <h6 class="text-muted mb-1">Total Voters</h6>
                <h3 class="fw-bold mb-0">1,250</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card shadow-sm border-0 h-100">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-success-soft me-3">
                <i class="bi bi-check-circle-fill text-success fs-3"></i>
              </div>
              <div>
                <h6 class="text-muted mb-1">Votes Cast</h6>
                <h3 class="fw-bold mb-0">980</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card shadow-sm border-0 h-100">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-warning-soft me-3">
                <i class="bi bi-person-badge-fill text-warning fs-3"></i>
              </div>
              <div>
                <h6 class="text-muted mb-1">Candidates</h6>
                <h3 class="fw-bold mb-0">4</h3>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Actions & Activity -->
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-white">
              <h5 class="mb-0 fw-bold">Quick Actions</h5>
            </div>
            <div class="card-body">
              <button class="btn btn-primary w-100 mb-3">
                Add New Candidate
              </button>
              <button class="btn btn-success w-100 mb-3">Register Voter</button>
              <a href="results.html" class="btn btn-warning w-100 mb-3"
                >View Live Results</a
              >
              <button class="btn btn-danger w-100">End Voting Session</button>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-white">
              <h5 class="mb-0 fw-bold">Recent Activity</h5>
            </div>
            <div class="card-body">
              <ul class="list-unstyled mb-0">
                <li class="mb-3 pb-3 border-bottom">
                  <small class="text-muted">2 mins ago</small>
                  <p class="mb-0">New vote cast by Voter #1023</p>
                </li>
                <li class="mb-3 pb-3 border-bottom">
                  <small class="text-muted">15 mins ago</small>
                  <p class="mb-0">New voter registered: Tunde Bakare</p>
                </li>
                <li>
                  <small class="text-muted">1 hour ago</small>
                  <p class="mb-0">Voting session started</p>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
