<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/all.css" />

    <title>Voting Results</title>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark shadow-sm bg-primary">
      <div class="container">
        <span class="navbar-brand mb-0 h1">Voting Results</span>
        <a href="dashboard.html" class="btn btn-outline-light">
          Back to Dashboard
        </a>
      </div>
    </nav>

    <!-- Content -->
    <div class="container py-5">
      <div class="text-center mb-5">
        <i
          class="bi bi-bar-chart-fill text-primary"
          style="font-size: 48px"
        ></i>
        <h2 class="fw-bold mt-3">Live Voting Results</h2>
        <p class="text-muted">Total Votes Cast: 1,250</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">
          <!-- Candidate 1 -->
          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <div>
                  <h5 class="fw-bold mb-1">John Adewale</h5>
                  <p class="text-muted mb-0">Progressive Party</p>
                </div>
                <div class="text-end">
                  <h4 class="fw-bold mb-0">55%</h4>
                  <small class="text-muted">688 votes</small>
                </div>
              </div>
              <div class="progress" style="height: 12px">
                <div class="progress-bar bg-success" style="width: 55%"></div>
              </div>
            </div>
          </div>

          <!-- Candidate 2 -->
          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <div>
                  <h5 class="fw-bold mb-1">Samuel Okoro</h5>
                  <p class="text-muted mb-0">Unity Party</p>
                </div>
                <div class="text-end">
                  <h4 class="fw-bold mb-0">45%</h4>
                  <small class="text-muted">562 votes</small>
                </div>
              </div>
              <div class="progress" style="height: 12px">
                <div class="progress-bar bg-primary" style="width: 45%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
